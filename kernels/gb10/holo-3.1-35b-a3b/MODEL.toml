[model]
name = "holo-3.1-35b-a3b"
hf_id = "Hcompany/Holo-3.1-35B-A3B-NVFP4"
params = "35B"
active_params = "3B"
architecture = "Gated DeltaNet + Full Attention + MoE + Qwen3-VL ViT"

layers_total = 40
layers_linear_attention = 30
layers_full_attention = 10
layer_pattern = "3:1 (linear, linear, linear, full)"

moe_experts = 256
moe_topk = 8
moe_intermediate = 512
shared_expert_intermediate = 512

hidden_dim = 2048
head_dim = 256
q_heads = 16
kv_heads = 2

linear_attn_key_heads = 16
linear_attn_key_dim = 128
linear_attn_value_heads = 32
linear_attn_value_dim = 128
linear_conv_kernel = 4

vocab_size = 248320
max_position_embeddings = 262144
rope_theta = 10000000
partial_rotary_factor = 0.25
attn_output_gate = true

mrope_interleaved = true
mrope_section = [11, 11, 10]
mtp_layers = 0
vision = true
image_token_id = 248056

# POC target: keep the default demo footprint small; callers can still pass a
# larger max sequence length after validating memory.
effective_context = 4096

[sampling.thinking_text]
temperature = 0.6
top_p = 0.95
top_k = 20
presence_penalty = 0.0
frequency_penalty = 0.0
repetition_penalty = 1.0
dry_multiplier = 0.0

[sampling.thinking_coding]
temperature = 0.6
top_p = 0.95
top_k = 20
presence_penalty = 0.0
frequency_penalty = 0.0
repetition_penalty = 1.0
dry_multiplier = 0.0

[sampling.non_thinking]
temperature = 0.7
top_p = 0.8
top_k = 20
presence_penalty = 0.0
frequency_penalty = 0.0
repetition_penalty = 1.0
dry_multiplier = 0.0

[sampling.tools]
temperature = 0.6
top_p = 0.95
top_k = 20
presence_penalty = 0.0
frequency_penalty = 0.0
repetition_penalty = 1.0
dry_multiplier = 0.0

[behavior]
thinking_default = true
thinking_in_tools = true
max_thinking_budget = 768
max_inter_tool_prose = 384
max_post_think_content_tokens = 8192
default_num_drafts = 0
tool_call_parser = "qwen3_coder"
# Tool-call grammar OFF: XGrammar-constrained decoding for tool requests makes
# Holo-3.1 degenerate (runaway reasoning, hallucinated `Human:` turns, fin=length)
# — verified against vLLM, which does free-generate + parse-after and stays
# coherent. Disabling it makes Atlas match vLLM (concise, correct tools, clean
# stops). The qwen3_coder parser still reads the model's tool calls.
disable_tool_grammar = true

[[model_types]]
model_type = "holo3_1_moe"
hidden_size = 2048

[kernel]
moe_gate_shmem_bytes = 4096

# DFlash pairing used by the vLLM Holo service. The drafter config has
# block_size=16, hidden=2048, vocab=248320, and target_layer_ids below.
[dflash]
draft_model = "z-lab/Qwen3.5-35B-A3B-DFlash"
gamma = 16
window_size = 4096
mask_token_id = 248070
target_layer_ids = [1, 10, 19, 28, 37]
