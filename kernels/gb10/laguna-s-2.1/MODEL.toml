[model]
name = "laguna-s-2.1"
hf_id = "poolside/Laguna-S-2.1-NVFP4"
model_type = "laguna"
architecture = "Hybrid Full/Sliding Attention + Dense/MoE"
parameters = "117.6B-A8.5B"

layers_total = 48
layers_sliding_attention = 36
layers_full_attention = 12
layer_pattern = "1 full attention followed by 3 sliding attention"

hidden_dim = 3072
head_dim = 128
q_heads = 72
kv_heads = 8
intermediate_size = 12288
moe_experts = 256
moe_topk = 10
moe_intermediate = 1024
shared_expert_intermediate = 1024
moe_scoring_func = "sigmoid"
moe_routing_bias = true

rotary_dim = 64
rope_theta = 500000
partial_rotary_factor = 0.5
vocab_size = 100352
max_position_embeddings = 262144
sliding_window = 512
vision = false
mtp_layers = 0

[sampling.thinking_text]
temperature = 1.0
top_p = 0.95
top_k = 50
presence_penalty = 0.0
repetition_penalty = 1.0
dry_multiplier = 0.0

[sampling.thinking_coding]
temperature = 1.0
top_p = 0.95
top_k = 50
presence_penalty = 0.0
repetition_penalty = 1.0
dry_multiplier = 0.0

[sampling.non_thinking]
temperature = 1.0
top_p = 0.95
top_k = 50
presence_penalty = 0.0
repetition_penalty = 1.0
dry_multiplier = 0.0

[sampling.tools]
temperature = 1.0
top_p = 0.95
top_k = 50
presence_penalty = 0.0
frequency_penalty = 0.0
repetition_penalty = 1.0
dry_multiplier = 0.0

[behavior]
# The thinking-phase loop watchdog force-injects `</think>` on a period-4..20
# repeat in the reasoning tail. On this model it does more harm than good:
# measured 2026-07-22 on RC1, "Explain why the sky is blue in two sentences."
#   watchdog ON  -> fires at thinking_tokens=264, finish=length, and the
#                   post-close CONTENT is spam ('####...' / backtick runs)
#   watchdog OFF -> reasoning stays coherent, no spam
# Force-closing a reasoning block the model did not choose to end leaves it
# with no natural continuation. Other models keep the watchdog (flag defaults
# to true); this opts Laguna out.
enable_think_loop_watchdog = false
# The rest of the thinking-watchdog family misfires the same way on this model:
# they all trip on the temperature-0 greedy repeat-plateau the model falls into
# (it is designed for 0.7/0.95, not greedy), then force-close </think> or
# rollback mid-reason, after which the content channel degenerates into token
# spam. Measured 2026-07-22 on RC1: F2 "Confidence early stop armed" fired on
# "explain the sky in two sentences" -> finish=length garbage; with the whole
# family off + default sampling the same prompt is coherent. Disable all of them
# for Laguna; other models keep the defaults (true).
confidence_early_stop = false
rollback_resteer = false
# This model loops stochastically even at its recommended 0.7 sampling
# ('TheTheThe' / 'I. ofA. of' repeat spam on long reasoning). Unlike the
# qwen3.6-35b-a3b sibling (NVFP4 lm-head), we serve a BF16 lm-head, so the
# drift is NOT the head -- it is the NVFP4 MoE / general FP-quant tail. A min_p
# FLOOR truncates that tail; MEASURED here: min_p 0 -> most prompts degenerate,
# 0.05 -> 1/6, 0.1 -> see below. It is a partial mitigation (the thinking
# watchdogs above were the other, cruder catch). temperature_max caps runaway
# client temps at the model's recommended ceiling.
min_p_floor = 0.1
temperature_max = 1.0
thinking_in_tools = true
max_thinking_budget = 8192
# vLLM single-budget: max_thinking_budget is the SOLE thinking cap. Real agents
# set a small max_tokens per turn but still want full reasoning; the default
# 90%-of-max_tokens secondary clamp (a budget vLLM does not have) truncated
# thinking on those turns. False = reasoning bounded only by max_thinking_budget.
cap_thinking_at_max_tokens = false
# Poolside recommends thinking for agentic coding and preserving it between
# tool calls. Clients can still opt out per request with enable_thinking=false.
thinking_default = true
default_kv_dtype = "fp8"
tool_call_parser = "poolside_v1"
# The model card recommends 0.7 / 0.95 for quality and reliability, while the
# generic generation_config.json retains 1.0 / 1.0 evaluation defaults.
use_sampling_presets_for_core = true
# OpenCode already supplies its cwd in the native system prompt. Reinjecting a
# second Atlas-specific environment block made Laguna fixate on path discovery.
disable_cwd_hint_injection = true
# Laguna is a chatty planner: it writes a paragraph of reasoning/plan before each
# tool call. The default 384-token inter-tool prose budget (a degeneration guard)
# truncated legitimate planning mid-turn ("prose budget exhausted, ending
# response"), forcing extra turns. Raise it to give real agentic prose headroom
# while still catching a genuine run-on loop.
max_inter_tool_prose = 2048

[[model_types]]
model_type = "laguna"
hidden_size = 3072

[kernel]
moe_gate_shmem_bytes = 6144
