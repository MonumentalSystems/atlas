<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Atlas is an open source, pure Rust and CUDA LLM inference engine hand tuned for NVIDIA DGX Spark. What ships is what we verify." />
    <meta name="theme-color" content="#f4f0e8" />

    <!-- Favicon: SVG covers every modern browser; apple-touch-icon for iOS home screen -->
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Atlas, inference for the machine on your desk" />
    <meta property="og:description" content="Open source, pure Rust + CUDA. Verified on DGX Spark (GB10), in bring-up on AMD Strix Halo. Every number is a receipt." />
    <meta property="og:url" content="https://atlasinference.io/" />
    <meta property="og:image" content="https://atlasinference.io/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Atlas, pure Rust inference tuned for the machine on your desk" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Atlas, inference for the machine on your desk" />
    <meta name="twitter:description" content="Open source, pure Rust + CUDA. Verified on DGX Spark. Every number is a receipt." />
    <meta name="twitter:image" content="https://atlasinference.io/og-image.png" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
